apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: flex-bundle-promotion
  namespace: flux-system
spec:
  providerRef:
    name: github-dispatch
  eventSeverity: info
  eventMetadata:
    action: flux-promotion
    source_cluster: stage
    source_bundle: stage-flex
    target_bundle: prod-stable
  eventSources:
    - kind: HelmRelease
      name: cilium
      namespace: kube-system
    - kind: HelmRelease
      name: cert-manager
      namespace: cert-manager
    - kind: HelmRelease
      name: external-secrets
      namespace: external-secrets
    - kind: HelmRelease
      name: cloudnative-pg
      namespace: cnpg-system
    - kind: HelmRelease
      name: envoy-gateway
      namespace: envoy-gateway-system
    - kind: HelmRelease
      name: n8n
      namespace: homelab
    - kind: HelmRelease
      name: podinfo
      namespace: homelab
    - kind: HelmRelease
      name: immich
      namespace: homelab
    - kind: HelmRelease
      name: vaultwarden
      namespace: vaultwarden
    - kind: HelmRelease
      name: piraeus-operator
      namespace: linstor
