name: e2e

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Setup Kubernetes Kind
        uses: helm/kind-action@main
        with:
          cluster_name: local
          config: kind-config.yaml

      - name: Install Flux controllers
        run: flux install

      - name: Create namespaces
        run: kubectl apply -f clusters/local/namespaces.yaml

      - name: Create sops-age secret
        run: |
          kubectl create secret generic sops-age \
            --namespace=flux-system \
            --from-literal=sops.agekey="${{ secrets.SOPS_AGE_KEY }}"

      - name: Create git source
        run: |
          flux create source git flux-system \
            --url=${{ github.server_url }}/${{ github.repository }} \
            --branch=${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}

      - name: Apply Flux kustomizations
        run: |
          kubectl apply -f clusters/local/crds.yaml
          kubectl apply -f clusters/local/bundle.yaml

      - name: Wait for CRDs
        run: |
          kubectl -n flux-system wait kustomization/crds \
            --for=condition=Ready \
            --timeout=10m

      - name: Wait for bundle
        run: |
          kubectl -n flux-system wait kustomization/bundle \
            --for=condition=Ready \
            --timeout=15m

      - name: Verify podinfo
        run: |
          kubectl -n homelab wait helmrelease/podinfo \
            --for=condition=Ready \
            --timeout=5m
          kubectl -n homelab rollout status deployment/podinfo \
            --timeout=5m

      - name: Debug on failure
        if: failure()
        run: |
          flux get all -A
          flux logs -A
          kubectl -n flux-system get kustomizations -o yaml
